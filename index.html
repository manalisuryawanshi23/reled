<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELED - Premium LED Lighting Solutions</title>
    <meta name="description" content="RELED is a leading manufacturer of premium LED lighting solutions for industrial, commercial, and architectural applications. Explore our wide range of energy-efficient lighting products." />
    <meta property="og:title" content="RELED - Premium LED Lighting Solutions" />
    <meta property="og:description" content="Leading manufacturer of premium LED lighting for industrial, commercial, and architectural applications." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA will be injected by vite-plugin-pwa -->
    <meta name="theme-color" content="#f59e0b" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Capture PWA install prompt EARLY before React loads -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        // Dispatch custom event so any React listener can also pick it up
        window.dispatchEvent(new Event('pwaInstallReady'));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
